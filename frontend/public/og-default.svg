<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="100%" stop-color="#151515" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#F3E5AB" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)" />
  <!-- Elegant border -->
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="url(#gold-grad)" stroke-width="2" opacity="0.6"/>
  <!-- Decorative corner elements -->
  <path d="M 25,60 L 60,60 L 60,25" fill="none" stroke="url(#gold-grad)" stroke-width="3"/>
  <path d="M 1175,60 L 1140,60 L 1140,25" fill="none" stroke="url(#gold-grad)" stroke-width="3"/>
  <path d="M 25,570 L 60,570 L 60,605" fill="none" stroke="url(#gold-grad)" stroke-width="3"/>
  <path d="M 1175,570 L 1140,570 L 1140,605" fill="none" stroke="url(#gold-grad)" stroke-width="3"/>

  <!-- Logo and Icon in Center -->
  <g transform="translate(600, 260)" text-anchor="middle">
    <!-- Diamond -->
    <path d="M 0,-100 L 60,-40 L 0,20 L -60,-40 Z" fill="url(#gold-grad)" stroke="#fff" stroke-width="1"/>
    <path d="M 0,-100 L 0,20 M -60,-40 L 60,-40" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <circle cx="0" cy="-40" r="6" fill="#fff"/>
    
    <text y="90" font-family="'Cinzel', 'Georgia', serif" font-size="54" font-weight="700" fill="url(#gold-grad)" letter-spacing="10">RAJSHREE</text>
    <text y="130" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#888" letter-spacing="14">J E W E L S</text>
    <text y="190" font-family="'Inter', sans-serif" font-size="14" font-weight="400" fill="#C9A84C" letter-spacing="4" opacity="0.8">THE EPITOME OF GOLD AND KUNDAN LUXURY</text>
  </g>
</svg>
